<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>MITRE ATT&CK Security Analyzer</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.2.0/github-markdown.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="./config.js"></script>
    <style>
        :root { --primary-blue: #0969da; }
        body { font-family: sans-serif; background-color: #f6f8fa; padding: 40px; }
        #container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        textarea { width: 100%; padding: 10px; margin-bottom: 10px; border-radius: 5px; border: 1px solid #ddd; }
        button { background: var(--primary-blue); color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; width: 100%; }
        #result-area { margin-top: 20px; padding: 20px; border-top: 1px solid #eee; }
    </style>
</head>
<body>

<div id="container">
    <h1>🛡️ MITRE 분석기 <small>v1.6</small></h1>
    <textarea id="query" rows="5" placeholder="공격 시나리오를 입력하세요..."></textarea>
    <button id="btn-analyze" onclick="sendRequest()">보안 분석 시작</button>
    <div id="result-area" class="markdown-body">결과가 여기에 표시됩니다.</div>
</div>

<script>
    async function sendRequest() {
        const queryValue = document.getElementById('query').value;
        const resultDiv = document.getElementById('result-area');
        
        if(!queryValue.trim()) return;
        resultDiv.innerHTML = "분석 중...";

        try {
            const url = CONFIG.WEBHOOK_URL + CONFIG.WEBHOOK_PATH;
            
            // 인증 정보가 있을 경우에만 Header 추가
            const headers = { 'Content-Type': 'application/json' };
            if(CONFIG.AUTH_USER && CONFIG.AUTH_PASS) {
                headers['Authorization'] = 'Basic ' + btoa(CONFIG.AUTH_USER + ":" + CONFIG.AUTH_PASS);
            }

            const response = await fetch(url, {
                method: 'POST',
                headers: headers,
                body: JSON.stringify({ "text": queryValue }) // n8n과 키값(text) 일치 확인
            });

            if (!response.ok) throw new Error('Network response was not ok');
            
            const data = await response.json();
            // n8n의 응답 구조에 따라 data.result 또는 data[0].result 등으로 수정 필요
            resultDiv.innerHTML = marked.parse(data.result || "결과를 가져올 수 없습니다.");
            
        } catch (error) {
            resultDiv.innerHTML = "❌ 서버 연결 에러 (터널 주소 및 n8n 설정을 확인하세요)";
            console.error(error);
        }
    }
</script>
</body>
</html>
