<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MITRE ATT&CK Security Analyzer</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.2.0/github-markdown.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <!-- 설정 파일: Cloudflare 주소 및 인증 정보 관리 -->
    <script src="./config.js"></script>
    
    <style>
        :root {
            --bg-color: #f6f8fa;
            --container-bg: #ffffff;
            --primary-blue: #0969da;
            --status-red: #cf222e;
            --status-green: #1a7f37;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            display: flex; justify-content: center; padding: 40px 20px;
        }

        #service-container {
            width: 100%; max-width: 850px;
            background: var(--container-bg);
            padding: 32px; border-radius: 12px;
            box-shadow: 0 8px 24px rgba(140, 149, 159, 0.2);
            border: 1px solid #d0d7de;
        }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .header h1 { font-size: 24px; margin: 0; color: #1f2328; }
        
        .status-badge { padding: 4px 12px; border-radius: 2em; font-size: 12px; font-weight: 600; color: #fff; text-transform: uppercase; }

        .control-panel { background: #f6f8fa; border: 1px solid #d0d7de; border-radius: 8px; padding: 20px; margin-bottom: 24px; }

        .btn-group { display: flex; gap: 8px; margin-bottom: 16px; }
        button { padding: 8px 16px; font-weight: 600; border-radius: 6px; border: 1px solid rgba(27, 31, 36, 0.15); cursor: pointer; transition: 0.2s; }

        #btn-start { background: var(--status-green); color: white; }
        #btn-stop { background: var(--status-red); color: white; }
        #btn-download { background: #24292f; color: white; border: none; }
        #btn-analyze { width: 100%; background: var(--primary-blue); color: white; font-size: 16px; padding: 12px; margin-top: 12px; }
        button:disabled { opacity: 0.4; cursor: not-allowed; }

        textarea { width: 100%; padding: 12px; border: 1px solid #d0d7de; border-radius: 6px; font-family: monospace; font-size: 14px; box-sizing: border-box; resize: vertical; }

        #result-area { margin-top: 32px; padding: 24px; border-top: 1px solid #d0d7de; background: #fff; min-height: 200px; }
        .loading-text { color: var(--primary-blue); font-weight: 600; text-align: center; }
    </style>
</head>
<body>

<div id="service-container">
    <div class="header">
        <h1>🛡️ MITRE 분석기 <small style="color: #636c76; font-size: 14px;">v1.6</small></h1>
        <div style="display: flex; gap: 10px;">
            <button id="btn-download" onclick="downloadPDF()" disabled>PDF 즉시 저장</button>
            <span id="status-badge" class="status-badge" style="background: #6e7781;">OFFLINE</span>
        </div>
    </div>

    <div class="control-panel">
        <div class="btn-group">
            <button id="btn-start" onclick="toggleService(true)">서비스 시작</button>
            <button id="btn-stop" onclick="toggleService(false)" disabled>서비스 종료</button>
        </div>
        <textarea id="query" rows="5" placeholder="공격 시나리오를 입력하세요..." disabled></textarea>
        <button id="btn-analyze" onclick="sendRequest()" disabled>보안 분석 시작</button>
    </div>

    <div id="result-area" class="markdown-body">
        <p style="color: #636c76;">서비스를 시작한 후 분석을 진행해 주세요.</p>
    </div>
</div>

<script>
    let isServiceRunning = false;
    // config.js에서 설정값을 로드합니다.
    const REMOTE_WEBHOOK = CONFIG.WEBHOOK_URL + CONFIG.WEBHOOK_PATH;
    const AUTH_USER = CONFIG.AUTH_USER;
    const AUTH_PASS = CONFIG.AUTH_PASS;

    // 1. 상태 복구
    window.addEventListener('DOMContentLoaded', () => {
        const savedQuery = sessionStorage.getItem('security_query');
        const savedResult = sessionStorage.getItem('security_result');
        const savedStatus = sessionStorage.getItem('service_status');
        if (savedQuery) document.getElementById('query').value = savedQuery;
        if (savedResult) {
            document.getElementById('result-area').innerHTML = savedResult;
            document.getElementById('btn-download').disabled = false;
        }
        if (savedStatus === 'true') toggleService(true);
    });

    document.getElementById('query').addEventListener('input', (e) => sessionStorage.setItem('security_query', e.target.value));

    function toggleService(run) {
        isServiceRunning = run;
        sessionStorage.setItem('service_status', run);
        const badge = document.getElementById('status-badge');
        badge.innerText = run ? 'ONLINE' : 'OFFLINE';
        badge.style.background = run ? '#1a7f37' : '#cf222e';
        document.getElementById('btn-start').disabled = run;
        document.getElementById('btn-stop').disabled = !run;
        document.getElementById('query').disabled = !run;
        document.getElementById('btn-analyze').disabled = !run;
        if(!run) { sessionStorage.clear(); location.reload(); }
    }

    async function sendRequest() {
        const queryValue = document.getElementById('query').value;
        const resultDiv = document.getElementById('result-area');
        const btn = document.getElementById('btn-analyze');
        const dlBtn = document.getElementById('btn-download');

        if(!queryValue.trim()) return;

        btn.disabled = true;
        dlBtn.disabled = true;
        resultDiv.innerHTML = "<div class='loading-text'>분석 리포트 생성 중... (RTX 5060)</div>";

        try {
            const response = await fetch(REMOTE_WEBHOOK, {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'Authorization': 'Basic ' + btoa(AUTH_USER + ":" + AUTH_PASS)
                },
                body: JSON.stringify({ "user_query": queryValue })
            });
            const data = await response.text();
            
            // 🚀 [보완] AI가 출력한 지침 찌꺼기 강제 제거 로직
            const cleanData = data.replace(/\[내부 지침[\s\S]*?최종 리포트 시작 - 이 아래 내용만 사용자에게 노출\]/g, "")
                                  .replace(/\[RULES\][\s\S]*?\[OUTPUT FORMAT\]/g, "")
                                  .trim();

            const renderedHtml = marked.parse(cleanData);
            resultDiv.innerHTML = renderedHtml;
            sessionStorage.setItem('security_result', renderedHtml);
            dlBtn.disabled = false;
        } catch (error) {
            resultDiv.innerHTML = "❌ 서버 연결 에러 (n8n 확인 필요)";
        } finally { btn.disabled = false; }
    }

    // 🚀 [수정] 인쇄 창 없이 즉시 PDF로 저장하는 함수
    async function downloadPDF() {
        const element = document.getElementById('result-area');
        const btn = document.getElementById('btn-download');
        
        btn.disabled = true;
        btn.innerText = "⏳ 파일 생성 중...";

        const options = {
            margin: [15, 15, 15, 15],
            filename: 'MITRE_Security_Report_' + new Date().getTime() + '.pdf',
            image: { type: 'jpeg', quality: 1.0 },
            html2canvas: { 
                scale: 3, // 고해상도 (텍스트 복사 품질 향상)
                useCORS: true,
                logging: false
            },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
            pagebreak: { mode: ['avoid-all', 'css', 'legacy'] } // 코드 블록 잘림 방지
        };

        try {
            // 🚀 핵심: .save()를 호출하여 인쇄 창 없이 즉시 다운로드
            await html2pdf().set(options).from(element).save();
        } catch (error) {
            alert("PDF 다운로드 중 오류가 발생했습니다.");
        } finally {
            btn.disabled = false;
            btn.innerText = "PDF 즉시 저장";
        }
    }
</script>
</body>
</html>
